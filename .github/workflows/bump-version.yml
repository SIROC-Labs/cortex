name: Bump Plugin Version

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: "Plugin name (must match folder under plugins/)"
        required: true
        default: "asana-workflow"
      level:
        description: "Semver level to bump"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run — print what would happen without modifying anything"
        required: false
        type: boolean
        default: false

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DRY_RUN: ${{ inputs.dry_run }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: bump
        run: |
          PLUGIN="${{ inputs.plugin }}"
          LEVEL="${{ inputs.level }}"
          PLUGIN_FILE="plugins/${PLUGIN}/.claude-plugin/plugin.json"

          if [ ! -f "$PLUGIN_FILE" ]; then
            echo "ERROR: Plugin not found: $PLUGIN_FILE"
            exit 1
          fi

          OLD_VERSION=$(python3 -c "import json; print(json.load(open('$PLUGIN_FILE'))['version'])")

          IFS='.' read -r major minor patch <<< "$OLD_VERSION"
          case "$LEVEL" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          NEW_VERSION="${major}.${minor}.${patch}"

          {
            echo "old_version=$OLD_VERSION"
            echo "new_version=$NEW_VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Write version files
        if: inputs.dry_run != true
        run: |
          PLUGIN="${{ inputs.plugin }}"
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          # Each agent discovers the plugin through a different manifest; keep their versions in lockstep.
          PLUGIN_FILE="plugins/${PLUGIN}/.claude-plugin/plugin.json"        # Claude Code: per-plugin manifest
          MARKETPLACE_FILE=".claude-plugin/marketplace.json"                # Claude Code: marketplace entry
          PACKAGE_FILE="package.json"                                       # OpenCode: npm manifest (asana-workflow only)
          CODEX_PLUGIN_FILE="plugins/${PLUGIN}/.codex-plugin/plugin.json"   # Codex: per-plugin manifest (if present)
          # Note: the Codex marketplace (.agents/plugins/marketplace.json) has no version field, so nothing to bump there.

          python3 - "$PLUGIN_FILE" "$NEW_VERSION" <<'PYEOF'
          import sys, json
          file, ver = sys.argv[1], sys.argv[2]
          with open(file) as f:
              data = json.load(f)
          data['version'] = ver
          with open(file, 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          PYEOF

          python3 - "$MARKETPLACE_FILE" "$PLUGIN" "$NEW_VERSION" <<'PYEOF'
          import sys, json
          file, name, ver = sys.argv[1], sys.argv[2], sys.argv[3]
          with open(file) as f:
              data = json.load(f)
          for p in data.get('plugins', []):
              if p.get('name') == name:
                  p['version'] = ver
                  break
          with open(file, 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          PYEOF

          # package.json is the asana-workflow OpenCode manifest; only bump it for that plugin
          if [ "$PLUGIN" = "asana-workflow" ]; then
            python3 - "$PACKAGE_FILE" "$NEW_VERSION" <<'PYEOF'
          import sys, json
          file, ver = sys.argv[1], sys.argv[2]
          with open(file) as f:
              data = json.load(f)
          data['version'] = ver
          with open(file, 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          PYEOF
          fi

          # Codex per-plugin manifest: same top-level version shape as plugin.json; bump only if the plugin ships one
          if [ -f "$CODEX_PLUGIN_FILE" ]; then
            python3 - "$CODEX_PLUGIN_FILE" "$NEW_VERSION" <<'PYEOF'
          import sys, json
          file, ver = sys.argv[1], sys.argv[2]
          with open(file) as f:
              data = json.load(f)
          data['version'] = ver
          with open(file, 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          PYEOF
          fi

      - name: Commit and push
        if: inputs.dry_run != true
        run: |
          PLUGIN="${{ inputs.plugin }}"
          OLD="${{ steps.bump.outputs.old_version }}"
          NEW="${{ steps.bump.outputs.new_version }}"
          TAG="${PLUGIN}@${NEW}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "plugins/${PLUGIN}/.claude-plugin/plugin.json" \
                  .claude-plugin/marketplace.json
          if [ "$PLUGIN" = "asana-workflow" ]; then
            git add package.json
          fi
          if [ -f "plugins/${PLUGIN}/.codex-plugin/plugin.json" ]; then
            git add "plugins/${PLUGIN}/.codex-plugin/plugin.json"
          fi

          git commit -m "chore(${PLUGIN}): bump version ${OLD} → ${NEW}"
          git tag "${TAG}"
          git push origin HEAD
          git push origin "${TAG}"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PLUGIN="${{ inputs.plugin }}"
          NEW="${{ steps.bump.outputs.new_version }}"
          TAG="${PLUGIN}@${NEW}"

          # Find the previous tag for this plugin
          PREV_TAG=$(git tag --list "${PLUGIN}@*" --sort=-v:refname | grep -v "^${TAG}$" | head -1)

          # Build changelog from commits touching this plugin's directory
          if [ -n "$PREV_TAG" ]; then
            if [ "$DRY_RUN" = "true" ]; then
              CHANGELOG=$(git log "${PREV_TAG}..HEAD" --oneline -- "plugins/${PLUGIN}/")
            else
              CHANGELOG=$(git log "${PREV_TAG}..${TAG}~1" --oneline -- "plugins/${PLUGIN}/")
            fi
            if [ -z "$CHANGELOG" ]; then
              CHANGELOG="No changes in plugins/${PLUGIN}/ since ${PREV_TAG}"
            fi
          else
            CHANGELOG="Initial release"
          fi

          if [ "$DRY_RUN" = "true" ]; then
            echo "::notice::DRY RUN — would create release:"
            echo "  tag:   ${TAG}"
            echo "  title: ${PLUGIN} ${NEW}"
            echo "  body:"
            echo "$CHANGELOG"
          else
            gh release create "${TAG}" \
              --title "${PLUGIN} ${NEW}" \
              --notes "${CHANGELOG}"
          fi

      - name: Summary
        run: |
          if [ "$DRY_RUN" = "true" ]; then HEADING="### [DRY RUN] Version Bump"; else HEADING="### Version Bump"; fi
          echo "$HEADING" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Plugin | \`${{ inputs.plugin }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Level  | \`${{ inputs.level }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Before | \`${{ steps.bump.outputs.old_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| After  | \`${{ steps.bump.outputs.new_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag    | \`${{ inputs.plugin }}@${{ steps.bump.outputs.new_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
